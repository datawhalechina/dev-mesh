schema_version = 3
project_key = "auto"
display_name = "local"
local_only = true

[automation]
auto_init = true
auto_reference = true
auto_sync = true

[knowledge_branch]
active = "main"
branches = ["main"]

[knowledge_branch.policies.main]
preset = "balanced"

[knowledge]
auto_capture_types = ["decision", "convention", "task", "pitfall", "macro_experience", "design_principle", "pitfall_record", "command", "glossary", "runbook", "adr", "note"]
include_volatile_in_context = false

[privacy]
redaction_enabled = true
upload_raw_transcripts = false
upload_large_source_blocks = false
