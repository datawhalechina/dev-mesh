name: Docker Images

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: docker.io

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: devmesh-server
            dockerfile: apps/mesh-server/Dockerfile
          - image: devmesh-web-admin
            dockerfile: apps/web-admin/Dockerfile
          - image: devmesh-website
            dockerfile: apps/website/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve image tags
        id: image
        shell: bash
        env:
          OWNER: ${{ github.repository_owner }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          image="${REGISTRY}/${OWNER}/${{ matrix.image }}"
          image="${image,,}"
          short_sha="${GITHUB_SHA::12}"

          {
            echo "name=${image}"
            echo "tags<<EOF"
            echo "${image}:sha-${short_sha}"

            if [[ "${REF_TYPE}" == "tag" ]]; then
              echo "${image}:${REF_NAME}"
              echo "${image}:alpha"
            else
              echo "${image}:manual-${GITHUB_RUN_NUMBER}"
            fi

            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
          push: true
